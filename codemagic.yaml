workflows:
  mobiscan_release:
    name: MobiScan Release
    max_build_duration: 120

    environment:
      flutter: stable
      vars:
        BUNDLE_ID: "com.anatolkaramanyan.mobiscan"
        APP_STORE_APPLE_ID: "6761273110"
      groups:
        - google_play
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Set iOS build number automatically
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          if [ -z "$LATEST_BUILD_NUMBER" ]; then
            LATEST_BUILD_NUMBER=0
          fi
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo "LATEST_BUILD_NUMBER=$LATEST_BUILD_NUMBER" | tee -a $CM_BUILD_DIR/build_numbers.env
          echo "NEW_BUILD_NUMBER=$NEW_BUILD_NUMBER" | tee -a $CM_BUILD_DIR/build_numbers.env
          cd ios
          agvtool new-version -all $NEW_BUILD_NUMBER
          agvtool what-version
          cd ..

      - name: Load build number
        script: |
          source $CM_BUILD_DIR/build_numbers.env
          echo "Using iOS build number: $NEW_BUILD_NUMBER"

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

      - name: Build iOS IPA
        script: |
          source $CM_BUILD_DIR/build_numbers.env
          flutter build ipa --release --build-number=$NEW_BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

      app_store_connect:
        auth: integration
