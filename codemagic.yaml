workflows:
  mobiscan_release:
    name: MobiScan Release
    max_build_duration: 120

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.anatolkaramanyan.mobiscan
      vars:
        BUNDLE_ID: "com.anatolkaramanyan.mobiscan"
        APP_STORE_APPLE_ID: "6761273110"
      groups:
        - google_play
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Generate config/api-keys.json
        script: |
          mkdir -p config
          echo "Generating config/api-keys.json from environment variables..."
          cat <<EOF > config/api-keys.json
          {
            "SUPABASE_URL": "$SUPABASE_URL",
            "SUPABASE_ANON_KEY": "$SUPABASE_ANON_KEY",
            "REVENUECAT_APPLE_API_KEY": "$REVENUECAT_APPLE_API_KEY",
            "REVENUECAT_GOOGLE_API_KEY": "$REVENUECAT_GOOGLE_API_KEY"
          }
          EOF

      - name: Set build numbers automatically
        script: |
          # Get version from pubspec.yaml
          PUBSPEC_VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo $PUBSPEC_VERSION | cut -d'+' -f1)
          VERSION_BUILD=$(echo $PUBSPEC_VERSION | cut -d'+' -f2)
          
          # Try to get latest build number from App Store, fallback to 0
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo "0")
          
          # Ensure it's a number
          if ! [[ "$LATEST_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            LATEST_BUILD_NUMBER=0
          fi
          
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          
          # Compare with pubspec version to avoid downgrading
          if [ "$VERSION_BUILD" -gt "$NEW_BUILD_NUMBER" ]; then
            NEW_BUILD_NUMBER=$VERSION_BUILD
          fi
          
          echo "VERSION_NAME=$VERSION_NAME"
          echo "FINAL_BUILD_NUMBER=$NEW_BUILD_NUMBER"
          
          echo "VERSION_NAME=$VERSION_NAME" > $CM_BUILD_DIR/build_numbers.env
          echo "NEW_BUILD_NUMBER=$NEW_BUILD_NUMBER" >> $CM_BUILD_DIR/build_numbers.env
          
          # Update iOS versioning
          cd ios
          agvtool new-marketing-version "$VERSION_NAME"
          agvtool new-version -all $NEW_BUILD_NUMBER
          cd ..

      - name: Build Android release AAB
        script: |
          source $CM_BUILD_DIR/build_numbers.env
          flutter build appbundle --release \
            --build-name="$VERSION_NAME" \
            --build-number=$NEW_BUILD_NUMBER \
            --dart-define-from-file=config/api-keys.json

      - name: Build iOS IPA
        script: |
          source $CM_BUILD_DIR/build_numbers.env
          flutter build ipa --release \
            --build-name="$VERSION_NAME" \
            --build-number=$NEW_BUILD_NUMBER \
            --dart-define-from-file=config/api-keys.json

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

      app_store_connect:
        auth: integration
